<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Sakura Sena | Fans">
  <meta property="og:title" content="Sakura Sena | Fans">
  <meta property="og:description" content="Sakura Sena is an archival media project created to preserve old videos, photos, and GIF animations.">
  <meta property="og:image" content="https://videotourl.com/images/1778116600538-af15f17d-ac1d-43eb-9b06-69ba10995076.jpg">
  <meta property="og:url" content="https://sakurasena.run.place/">
  <meta property="og:type" content="website">
  <title>Sakura Sena | Fans</title>
  <link rel="icon" href="./static/icon/favicon.ico" type="image/x-icon">
  <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Noto+Sans:wght@300;400;600&display=swap" rel="stylesheet">
  <style>
    :root {
      --accent: #ff0055;
      --accent2: #ff3377;
      --bg: #0a0a0a;
      --bg2: #141414;
      --bg3: #1c1c1c;
      --border: #272727;
      --text: #f0f0f0;
      --muted: #666;
      --header-h: 52px;
      --nav-h: 62px;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Noto Sans', sans-serif;
      padding-top: var(--header-h);
      padding-bottom: var(--nav-h);
    }

    /* HEADER */
    .site-header {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--header-h);
      background: rgba(10,10,10,0.97);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 100;
    }

    .site-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 26px;
      letter-spacing: 4px;
      background: linear-gradient(90deg, #fff 20%, var(--accent) 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--nav-h);
      background: rgba(10,10,10,0.98);
      backdrop-filter: blur(14px);
      border-top: 1px solid var(--border);
      display: flex;
      align-items: stretch;
      z-index: 100;
    }

    .nav-item {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 3px;
      cursor: pointer;
      color: var(--muted);
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.4px;
      text-transform: uppercase;
      transition: color 0.2s;
      -webkit-tap-highlight-color: transparent;
      border: none;
      background: none;
      padding: 0;
    }

    .nav-item svg { width: 21px; height: 21px; transition: transform 0.2s; }
    .nav-item.active { color: var(--accent); }
    .nav-item.active svg { transform: translateY(-2px); }

    /* PAGES */
    .page { display: none; padding: 12px; animation: fadeIn 0.2s ease; }
    .page.active { display: block; }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(5px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* SECTION LABEL ROW */
    .section-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }

    .section-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .section-line {
      flex: 1;
      height: 1px;
      background: var(--border);
      margin: 0 10px;
    }

    /* HOME THUMB ROW */
    .home-section { margin-bottom: 20px; }

    .thumb-scroll-wrap {
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
    }
    .thumb-scroll-wrap::-webkit-scrollbar { display: none; }

    .thumb-row-inner {
      display: flex;
      gap: 8px;
      padding-bottom: 4px;
    }

    /* SEE ALL CARD */
    .see-all-card {
      flex: 0 0 90px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg3);
      cursor: pointer;
      scroll-snap-align: start;
      aspect-ratio: 9/14;
      border: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: background 0.2s, border-color 0.2s;
      -webkit-tap-highlight-color: transparent;
    }
    .see-all-card:active { background: #222; }
    .see-all-card svg {
      width: 28px; height: 28px;
      color: var(--accent);
    }
    .see-all-card span {
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--muted);
      text-align: center;
      padding: 0 8px;
    }

    .thumb {
      flex: 0 0 130px;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg3);
      cursor: pointer;
      scroll-snap-align: start;
      position: relative;
      aspect-ratio: 9/14;
      border: 1px solid var(--border);
      transition: transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .thumb:active { transform: scale(0.95); }

    .thumb img, .thumb video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
    }

    .thumb-badge {
      position: absolute;
      top: 6px; left: 6px;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 2px 6px;
      border-radius: 4px;
      color: #fff;
    }
    .thumb-badge.video { background: var(--accent); }
    .thumb-badge.gif   { background: #14b464; }
    .thumb-badge.photo { background: #1a7fff; }

    .thumb-play-overlay {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.28);
    }
    .thumb-play-overlay svg { width: 32px; height: 32px; }

    /* ── VIDEO PAGE ── */
    #page-video { padding: 0; }

    .video-page-header {
      padding: 14px 14px 10px;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 13px;
      letter-spacing: 2px;
      color: var(--accent);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .video-page-header::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .video-list { display: flex; flex-direction: column; gap: 0; }

    .video-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      transition: background 0.15s;
    }
    .video-row:active { background: var(--bg2); }

    .video-row-thumb {
      flex-shrink: 0;
      width: 110px;
      aspect-ratio: 16/9;
      border-radius: 8px;
      overflow: hidden;
      background: var(--bg3);
      position: relative;
      border: 1px solid var(--border);
    }
    .video-row-thumb video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .video-row-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.35);
    }
    .video-row-play svg { width: 28px; height: 28px; }

    .video-row-info { flex: 1; min-width: 0; }
    .video-row-title {
      font-size: 13px;
      font-weight: 600;
      line-height: 1.4;
      margin-bottom: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .video-row-meta {
      font-size: 11px;
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .video-row-meta .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--muted); }

    .video-row-arrow {
      flex-shrink: 0;
      color: var(--muted);
    }
    .video-row-arrow svg { width: 16px; height: 16px; }

    /* VIDEO MODAL PLAYER */
    .video-modal {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 300;
      background: #000;
      flex-direction: column;
      animation: fadeIn 0.2s ease;
    }
    .video-modal.open { display: flex; }

    .video-modal-topbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 12px 14px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }

    .video-modal-back {
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.08);
      border: none;
      color: var(--text);
      width: 36px; height: 36px;
      border-radius: 50%;
      cursor: pointer;
      flex-shrink: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .video-modal-back svg { width: 20px; height: 20px; }

    .video-modal-title {
      font-size: 14px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .video-modal-player-wrap {
      background: #000;
      flex-shrink: 0;
    }

    .video-modal-info {
      padding: 14px;
      flex: 1;
      overflow-y: auto;
    }

    .video-modal-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1px;
      margin-bottom: 6px;
    }

    .video-modal-tag {
      display: inline-block;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 20px;
      background: rgba(255,0,85,0.15);
      color: var(--accent);
      border: 1px solid rgba(255,0,85,0.3);
    }

    /* UP NEXT */
    .up-next-label {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 12px;
      letter-spacing: 2px;
      color: var(--accent);
      margin-top: 20px;
      margin-bottom: 10px;
    }

    .up-next-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 0;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
      -webkit-tap-highlight-color: transparent;
    }
    .up-next-row:last-child { border-bottom: none; }
    .up-next-thumb {
      width: 80px;
      aspect-ratio: 16/9;
      border-radius: 6px;
      overflow: hidden;
      background: var(--bg3);
      flex-shrink: 0;
      position: relative;
    }
    .up-next-thumb video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: block;
      pointer-events: none;
    }
    .up-next-play {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.3);
    }
    .up-next-play svg { width: 18px; height: 18px; }
    .up-next-title {
      font-size: 12px;
      font-weight: 600;
      flex: 1;
      line-height: 1.4;
    }

    /* Plyr */
    .plyr {
      --plyr-color-main: #ff0055;
      --plyr-video-control-color: #fff;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .plyr__control:focus,
    .plyr__control:focus-visible { outline: none !important; box-shadow: none !important; }
    .plyr__control::after,
    .plyr__control::before { display: none !important; }

    /* MEDIA GRID */
    .media-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 3px;
    }

    .media-item {
      aspect-ratio: 1;
      overflow: hidden;
      background: var(--bg3);
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      position: relative;
    }
    .media-item img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* LIGHTBOX */
    .lightbox {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.95);
      z-index: 200;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    .lightbox.open { display: flex; }

    .lightbox-close {
      position: absolute;
      top: 14px; right: 14px;
      background: rgba(255,255,255,0.1);
      border: none;
      color: #fff;
      width: 36px; height: 36px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      -webkit-tap-highlight-color: transparent;
    }
    .lightbox img { max-width: 100%; max-height: 85vh; border-radius: 8px; }

    /* ABOUT */
    .about-card {
      background: var(--bg2);
      border-radius: 16px;
      border: 1px solid var(--border);
      padding: 28px 20px;
      text-align: center;
    }
    .about-avatar{
      width:88px;
      height:88px;
      border-radius:50%;
      margin:0 auto 16px;
      display:flex;
      align-items:center;
      justify-content:center;
      border:2px solid rgba(255,0,85,0.3);
      overflow:hidden;
      background:linear-gradient(135deg, var(--accent), #660022);
    }
    .about-avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:block;
    }
    .about-name {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: var(--accent);
      margin-bottom: 10px;
    }
    .about-desc { font-size: 13px; color: var(--muted); line-height: 1.75; }
    .about-stats {
      display: flex;
      justify-content: space-around;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
    }
    .stat-num { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }
    .stat-lbl { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-top: 2px; }
  </style>
</head>

        "https://videotourl.com/images/1777924292805-d2f2bb3e-bd1c-43b0-9758-8ca1c6be2f37.jpg",
        "https://videotourl.com/images/1777924332020-14c483db-7efc-4b94-bead-f1e397cbaff4.jpg",
        "https://videotourl.com/images/1777924381856-3cbcfd2d-c4a2-4a3a-b716-8e429daf18a9.jpg",
        "https://videotourl.com/images/1777924584012-603d5269-6bdf-4091-b3e6-563009266886.jpg",
        "https://videotourl.com/images/1777924622701-c07eb6d3-c8bd-4856-8c4c-ce30deed32c3.jpg",
        "https://videotourl.com/images/1777924676339-545d1dbc-55ee-48f0-aa90-48b06e898a90.jpeg",
        "https://videotourl.com/images/1777942421604-96004a26-20cf-4bf3-8a04-4c88f2afe0ab.jpeg",
        "https://videotourl.com/images/1778296368393-9d324c2a-65d9-4c9e-b6d1-c75b9c06126f.jpeg",
        "https://videotourl.com/images/1778296534925-1dc9f8b3-b752-400a-b093-7f69c190075e.jpeg",
      ],
      gifs: [
        "https://videotourl.com/images/1777931594485-3f280f88-35ac-4c66-a529-6348f559c9ca.gif",
        "https://videotourl.com/images/1777931725080-0e129bc2-94ba-4833-aaab-d7ac42a676c5.gif",
        "https://media.giphy.com/media/xT9IgG50Lg7russbDa/giphy.gif",
        "https://media.giphy.com/media/26ufdipQqU2lhNA4g/giphy.gif",
        "https://media.giphy.com/media/3oEjHAufDGNlAAnb5e/giphy.gif",
        "https://media.giphy.com/media/l2Je0vPZiXr6Brtgk/giphy.gif",
      ]
    };

    // ── MODAL PLAYER ──
    let modalPlayer = null;

    function openVideoModal(index) {
      const v = DATA.videos[index];
      const modal = document.getElementById('video-modal');
      const src = document.getElementById('modal-video-src');
      const videoEl = document.getElementById('modal-video');

      document.getElementById('modal-title').textContent = v.title;
      document.getElementById('modal-name').textContent = v.title;

      // Destroy previous player
      if (modalPlayer) {
        modalPlayer.destroy();
        modalPlayer = null;
      }

      src.src = v.url;
      videoEl.load();

      modalPlayer = new Plyr(videoEl, {
        controls: ['play-large','play','progress','current-time','mute','volume','fullscreen'],
        tooltips: { controls: false, seek: true },
      });

      // Up next list
      const upNext = document.getElementById('up-next-list');
      upNext.innerHTML = '';
      DATA.videos.forEach((vid, i) => {
        if (i === index) return;
        const row = document.createElement('div');
        row.className = 'up-next-row';
        row.innerHTML = `
          <div class="up-next-thumb">
            <video src="${vid.url}" preload="metadata" muted playsinline></video>
            <div class="up-next-play">
              <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <div class="up-next-title">${vid.title}</div>
        `;
        row.addEventListener('click', () => openVideoModal(i));
        upNext.appendChild(row);
      });

      modal.classList.add('open');
      document.body.style.overflow = 'hidden';
      window.scrollTo({ top: 0 });
    }

    function closeVideoModal() {
      const modal = document.getElementById('video-modal');
      if (modalPlayer) {
        modalPlayer.pause();
        modalPlayer.destroy();
        modalPlayer = null;
      }
      modal.classList.remove('open');
      document.body.style.overflow = '';
    }

    document.getElementById('modal-back').addEventListener('click', closeVideoModal);

    // ── NAVIGATION ──
    function navigateTo(page) {
      document.querySelectorAll('.nav-item').forEach(b => b.classList.toggle('active', b.dataset.page === page));
      document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
      document.getElementById('page-' + page).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    document.querySelectorAll('.nav-item').forEach(btn => {
      btn.addEventListener('click', () => {
        navigateTo(btn.dataset.page);
      });
    });

    // ── LIGHTBOX ──
    const lightbox = document.getElementById('lightbox');
    const lbContent = document.getElementById('lb-content');

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    lightbox.addEventListener('click', e => { if (e.target === lightbox) closeLightbox(); });

    function openLightbox(url) {
      lbContent.innerHTML = `<img src="${url}" alt="">`;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }
    function closeLightbox() {
      lbContent.innerHTML = '';
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function makeImg(url) {
      const el = document.createElement('img');
      el.src = url;
      el.loading = 'lazy';
      el.alt = '';
      return el;
    }

    function makeSeeAllCard(targetPage, label) {
      const card = document.createElement('div');
      card.className = 'see-all-card';
      card.innerHTML = `
        <svg viewBox="0 0 24 24" fill="currentColor">
          <path d="M12 4l-1.41 1.41L16.17 11H4v2h12.17l-5.58 5.59L12 20l8-8z"/>
        </svg>
        <span>See All ${label}</span>
      `;
      card.addEventListener('click', () => navigateTo(targetPage));
      return card;
    }

    // ── HOME ──
    function initHome() {
      // Videos
      const vrow = document.getElementById('home-videos');
      DATA.videos.forEach((v, i) => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        const vid = document.createElement('video');
        vid.src = v.url;
        vid.preload = 'metadata';
        vid.muted = true;
        vid.setAttribute('playsinline', '');
        vid.style.pointerEvents = 'none';
        thumb.appendChild(vid);
        const badge = document.createElement('div');
        badge.className = 'thumb-badge video';
        badge.textContent = 'Video';
        thumb.appendChild(badge);
        thumb.innerHTML += `
          <div class="thumb-play-overlay">
            <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
          </div>`;
        thumb.addEventListener('click', () => openVideoModal(i));
        vrow.appendChild(thumb);
      });
      vrow.appendChild(makeSeeAllCard('video', 'Videos'));

      // Photos
      const prow = document.getElementById('home-photos');
      DATA.photos.slice(0, 5).forEach(url => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.appendChild(makeImg(url));
        const badge = document.createElement('div');
        badge.className = 'thumb-badge photo';
        badge.textContent = 'Photo';
        thumb.appendChild(badge);
        thumb.addEventListener('click', () => openLightbox(url));
        prow.appendChild(thumb);
      });
      prow.appendChild(makeSeeAllCard('photo', 'Photos'));

      // GIFs
      const grow = document.getElementById('home-gifs');
      DATA.gifs.slice(0, 4).forEach(url => {
        const thumb = document.createElement('div');
        thumb.className = 'thumb';
        thumb.appendChild(makeImg(url));
        const badge = document.createElement('div');
        badge.className = 'thumb-badge gif';
        badge.textContent = 'GIF';
        thumb.appendChild(badge);
        thumb.addEventListener('click', () => openLightbox(url));
        grow.appendChild(thumb);
      });
      grow.appendChild(makeSeeAllCard('gif', 'GIFs'));
    }

    // ── VIDEO LIST PAGE ──
    function initVideoList() {
      const list = document.getElementById('video-list');
      DATA.videos.forEach((v, i) => {
        const row = document.createElement('div');
        row.className = 'video-row';
        row.innerHTML = `
          <div class="video-row-thumb">
            <video src="${v.url}" preload="metadata" muted playsinline></video>
            <div class="video-row-play">
              <svg viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
            </div>
          </div>
          <div class="video-row-info">
            <div class="video-row-title">${v.title}</div>
            <div class="video-row-meta">
              <span>MP4</span>
              <span class="dot"></span>
              <span>HD</span>
            </div>
          </div>
          <div class="video-row-arrow">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M8.59 16.59L13.17 12 8.59 7.41 10 6l6 6-6 6z"/></svg>
          </div>
        `;
        row.addEventListener('click', () => openVideoModal(i));
        list.appendChild(row);
      });
    }

    // ── PHOTO PAGE ──
    function initPhotos() {
      const grid = document.getElementById('photo-grid');
      DATA.photos.forEach(url => {
        const item = document.createElement('div');
        item.className = 'media-item';
        item.appendChild(makeImg(url));
        item.addEventListener('click', () => openLightbox(url));
        grid.appendChild(item);
      });
    }

    // ── GIF PAGE ──
    function initGifs() {
      const grid = document.getElementById('gif-grid');
      DATA.gifs.forEach(url => {
        const item = document.createElement('div');
        item.className = 'media-item';
        item.appendChild(makeImg(url));
        item.addEventListener('click', () => openLightbox(url));
        grid.appendChild(item);
      });
    }

    // STATS
    document.getElementById('stat-v').textContent = DATA.videos.length;
    document.getElementById('stat-p').textContent = DATA.photos.length;
    document.getElementById('stat-g').textContent = DATA.gifs.length;

    // INIT
    initHome();
    initVideoList();
    initPhotos();
    initGifs();
  </script>
</body>
</html>
