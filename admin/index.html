<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Panel</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    background: linear-gradient(135deg, #0f0f0f, #1a0000);
    color: #fff;
    min-height: 100vh;
}

/* GLASS */
.glass {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border: 1px solid rgba(255,255,255,0.1);
    border-radius: 20px;
}

/* LOGIN */
#loginBox {
    width: 320px;
    margin: 120px auto;
    padding: 30px;
}

input {
    width: 100%;
    padding: 12px;
    margin-top: 10px;
    border-radius: 10px;
    border: none;
    outline: none;
    background: rgba(255,255,255,0.1);
    color: white;
}

button {
    width: 100%;
    margin-top: 15px;
    padding: 12px;
    border-radius: 10px;
    border: none;
    cursor: pointer;
    background: #ff0033;
    color: white;
    font-weight: bold;
    transition: 0.2s;
}

button:hover {
    opacity: 0.8;
}

/* ADMIN */
#adminPanel {
    display: none;
    padding: 20px;
}

.header {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.card {
    padding: 20px;
    margin-bottom: 20px;
}

/* VIDEO LIST */
.video-item {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 12px;
    margin-top: 10px;
    border-radius: 12px;
    background: rgba(255,255,255,0.05);
}

.video-item video {
    width: 120px;
    border-radius: 10px;
}

.delete-btn {
    background: #ff0033;
    padding: 8px 12px;
    border-radius: 8px;
    cursor: pointer;
}
</style>
</head>

<body>

<!-- LOGIN -->
<div id="loginBox" class="glass">
    <h2>Admin Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
</div>

<!-- ADMIN -->
<div id="adminPanel">

    <div class="header">
        <h2>Dashboard</h2>
        <button onclick="logout()">Logout</button>
    </div>

    <!-- ADD VIDEO -->
    <div class="card glass">
        <h3>Add Video</h3>
        <input id="title" placeholder="Title">
        <input id="url" placeholder="Video URL">
        <button onclick="addVideo()">Add</button>
    </div>

    <!-- LIST -->
    <div class="card glass">
        <h3>Videos</h3>
        <div id="videos"></div>
    </div>

</div>

<script>
const supabase = window.supabase.createClient(
    "https://YOUR_PROJECT.supabase.co",
    "YOUR_ANON_KEY"
);

/* AUTH CHECK */
async function checkUser() {
    const { data } = await supabase.auth.getUser();
    if (data.user) {
        showAdmin();
    }
}

/* LOGIN */
async function login() {
    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    const { error } = await supabase.auth.signInWithPassword({
        email, password
    });

    if (error) {
        alert(error.message);
    } else {
        showAdmin();
    }
}

/* LOGOUT */
async function logout() {
    await supabase.auth.signOut();
    location.reload();
}

/* UI SWITCH */
function showAdmin() {
    document.getElementById("loginBox").style.display = "none";
    document.getElementById("adminPanel").style.display = "block";
    loadVideos();
}

/* ADD VIDEO */
async function addVideo() {
    const title = document.getElementById("title").value.trim();
    const url = document.getElementById("url").value.trim();

    if (!title || !url) return alert("Fill fields");

    const { error } = await supabase
        .from("videos")
        .insert([{ title, url }]);

    if (error) {
        alert(error.message);
    } else {
        document.getElementById("title").value = "";
        document.getElementById("url").value = "";
        loadVideos();
    }
}

/* LOAD VIDEOS */
async function loadVideos() {
    const { data } = await supabase
        .from("videos")
        .select("*")
        .order("created_at", { ascending: false });

    const container = document.getElementById("videos");
    container.innerHTML = "";

    data.forEach(v => {
        const div = document.createElement("div");
        div.className = "video-item";

        div.innerHTML = `
            <div>
                <div>${v.title}</div>
                <video src="${v.url}" controls></video>
            </div>
            <div class="delete-btn" onclick="deleteVideo(${v.id})">Delete</div>
        `;

        container.appendChild(div);
    });
}

/* DELETE */
async function deleteVideo(id) {
    const { error } = await supabase
        .from("videos")
        .delete()
        .eq("id", id);

    if (!error) loadVideos();
}

/* INIT */
checkUser();
</script>

</body>
</html>
